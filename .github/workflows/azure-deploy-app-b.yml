name: Deploy App B to Azure App Service
# trigger-note: app-b pipeline with oryx build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'server/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tailwind.config.ts'
      - 'tsconfig*.json'
      - '.github/workflows/azure-deploy-app-b.yml'

env:
  NODE_VERSION: '20'
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: 3bb447ee-be09-4fd3-9f1c-104fc7776954
  AZURE_SUBSCRIPTION_ID: fdd05880-48dd-46bd-be4c-36f7039e71d7
  APP_B_RESOURCE_GROUP: rg-portal-app-prod
  APP_B_WEBAPP_NAME: leadi-portal-app-prod-001

permissions:
  id-token: write
  contents: read

jobs:
  deploy_app_b:
    runs-on: ubuntu-latest
    name: 🚀 Deploy App B
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build frontend
        env:
          VITE_CHATBOT_BACKEND_URL: ${{ secrets.VITE_CHATBOT_BACKEND_URL }}
        run: |
          npm ci
          npm run build

      - name: Build backend package
        run: |
          cd server
          mkdir -p public
          cp -r ../dist/* public/
          cd ..
          rm -f appb-package.zip
          (cd server && zip -r ../appb-package.zip . -x "node_modules/*" ".git/*")

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Validate target web app exists
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e
            az webapp show \
              --resource-group "${{ env.APP_B_RESOURCE_GROUP }}" \
              --name "${{ env.APP_B_WEBAPP_NAME }}" >/dev/null
            echo "Target web app found"

      - name: Configure App B settings safely
        uses: azure/cli@v2
        with:
          inlineScript: |
            set_setting_if_present () {
              local key="$1"
              local value="$2"

              if [ -z "$value" ]; then
                echo "$key secret is empty; preserving existing App Service value"
                return
              fi

              az webapp config appsettings set \
                --resource-group "${{ env.APP_B_RESOURCE_GROUP }}" \
                --name "${{ env.APP_B_WEBAPP_NAME }}" \
                --settings "$key=$value" >/dev/null
              echo "$key updated"
            }

            set_setting_if_present "N8N_WEBHOOK_URL" '${{ secrets.N8N_WEBHOOK_URL }}'
            set_setting_if_present "CORS_ORIGIN" '${{ secrets.CORS_ORIGIN }}'
            set_setting_if_present "AZURE_STORAGE_CONTAINER" '${{ secrets.AZURE_STORAGE_CONTAINER }}'
            set_setting_if_present "AZURE_STORAGE_ACCOUNT_NAME" '${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}'

      - name: Deploy App B package (linux-safe zip with retry)
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e

            deploy_once () {
              az webapp deployment source config-zip \
                --resource-group "${{ env.APP_B_RESOURCE_GROUP }}" \
                --name "${{ env.APP_B_WEBAPP_NAME }}" \
                --src appb-package.zip
            }

            if deploy_once; then
              echo "Deployment succeeded on first attempt"
              exit 0
            fi

            echo "First deployment attempt failed; restarting app and retrying"
            az webapp restart \
              --resource-group "${{ env.APP_B_RESOURCE_GROUP }}" \
              --name "${{ env.APP_B_WEBAPP_NAME }}"
            sleep 20

            deploy_once
            echo "Deployment succeeded on second attempt"

  smoke_test_app_b:
    needs: [deploy_app_b]
    runs-on: ubuntu-latest
    name: 🔎 Smoke Test App B
    steps:
      - name: Validate homepage
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.APP_B_WEBAPP_NAME }}.azurewebsites.net/)
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Homepage check passed with status $STATUS"
              exit 0
            fi
            echo "Homepage check failed with status $STATUS, retry $i/10"
            sleep 10
          done
          exit 1

      - name: Validate health endpoint
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.APP_B_WEBAPP_NAME }}.azurewebsites.net/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Health check failed with status $STATUS, retry $i/10"
            sleep 10
          done
          exit 1
