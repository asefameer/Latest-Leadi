name: Build and Deploy to Azure

on:
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: leadi-portal-app-prod-001
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DISABLED_REASON: "Legacy workflow disabled to avoid duplicate deployments; use azure-deploy-app-b.yml"
    
    steps:
      - name: Stop legacy workflow
        run: |
          echo "$DISABLED_REASON"
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Prepare deployment package
        run: |
          # Copy built files to server/public
          rm -rf server/public/*
          cp -r dist/* server/public/
          
          # Create deployment zip (server folder only)
          cd server
          zip -r ../deploy.zip . -x "node_modules/*" -x ".git/*" -x "dist/*" -x "coverage/*"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip
